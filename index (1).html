<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tumbleverse</title>
<script src="https://unpkg.com/@solana/web3.js@1.95.2/lib/index.iife.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Michroma&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Michroma&family=Share+Tech+Mono&display=swap');
  
  :root{
    --bg-deep:#0a0e27;
    --bg-mid:#1a1f3a;
    --panel-dark:#0d1321;
    --panel-mid:#1d2d44;
    --panel-light:#2a3f5f;
    --accent-cyan:#00f0ff;
    --accent-pink:#ff2e97;
    --accent-gold:#ffc933;
    --accent-green:#00ff88;
    --text-primary:#ffffff;
    --text-secondary:rgba(255,255,255,.75);
    --text-muted:rgba(255,255,255,.5);
    --shadow-cyan:0 0 20px rgba(0,240,255,.4);
    --shadow-pink:0 0 20px rgba(255,46,151,.4);
    --shadow-gold:0 0 20px rgba(255,201,51,.4);
  }
  
  * {
    box-sizing: border-box;
  }
  
  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:var(--bg-deep);
    color:var(--text-primary);
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  
  #wrap{
    display:flex;
    height:100vh;
    width:100vw;
    gap:0;
    margin:0;
    padding:0;
  }
  
  /* ==================== GAME CANVAS ==================== */
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:var(--bg-deep);
  }
  
  canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
    image-rendering:crisp-edges;
  }
  
  /* Animated scanlines overlay */
  #game::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:repeating-linear-gradient(
      0deg,
      transparent 0px,
      rgba(0,240,255,.03) 1px,
      transparent 2px
    );
    pointer-events:none;
    animation:scanroll 8s linear infinite;
    z-index:2;
  }
  
  @keyframes scanroll{
    0%{ transform:translateY(0); }
    100%{ transform:translateY(100px); }
  }
  
  /* Vignette effect */
  #game::after{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.4) 100%);
    pointer-events:none;
    z-index:1;
  }
  
  /* ==================== SIDEBAR ==================== */
  #side{
    width:420px;
    background:linear-gradient(180deg, var(--panel-dark) 0%, var(--bg-deep) 100%);
    border-left:2px solid var(--accent-cyan);
    padding:28px 24px;
    display:flex;
    flex-direction:column;
    gap:20px;
    box-shadow:-8px 0 32px rgba(0,240,255,.2), inset 0 0 80px rgba(0,240,255,.03);
    overflow-y:auto;
    position:relative;
  }
  
  /* Ambient glow in sidebar */
  #side::before{
    content:'';
    position:absolute;
    top:-100px;
    right:-100px;
    width:300px;
    height:300px;
    background:radial-gradient(circle, rgba(0,240,255,.08) 0%, transparent 70%);
    pointer-events:none;
    animation:ambient-pulse 4s ease-in-out infinite;
  }
  
  @keyframes ambient-pulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.6; transform:scale(1.1); }
  }
  
  #side::-webkit-scrollbar{
    width:8px;
  }
  
  #side::-webkit-scrollbar-track{
    background:var(--panel-dark);
  }
  
  #side::-webkit-scrollbar-thumb{
    background:var(--accent-cyan);
    border-radius:4px;
  }
  
  /* ==================== TYPOGRAPHY ==================== */
  .title-main{
    font-family:'Righteous',sans-serif;
    font-size:32px;
    font-weight:400;
    letter-spacing:.15em;
    margin:0;
    text-transform:uppercase;
    background:linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-pink) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 12px rgba(0,240,255,.6));
    animation:title-glow 3s ease-in-out infinite;
  }
  
  @keyframes title-glow{
    0%, 100%{ filter:drop-shadow(0 0 12px rgba(0,240,255,.6)); }
    50%{ filter:drop-shadow(0 0 20px rgba(0,240,255,.9)); }
  }
  
  .section-title{
    font-family:'Michroma',sans-serif;
    font-size:13px;
    font-weight:400;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--accent-cyan);
    margin:8px 0 12px 0;
    text-shadow:0 0 8px rgba(0,240,255,.5);
  }
  
  /* ==================== HEADER ROW ==================== */
  .topRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:4px;
  }
  
  /* ==================== STATUS PILL ==================== */
  .pill{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:rgba(0,240,255,.08);
    border:1.5px solid var(--accent-cyan);
    border-radius:24px;
    padding:8px 16px;
    font-size:11px;
    color:var(--accent-cyan);
    text-transform:uppercase;
    font-weight:700;
    letter-spacing:.1em;
    box-shadow:0 0 16px rgba(0,240,255,.2);
    backdrop-filter:blur(10px);
  }
  
  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent-green);
    box-shadow:0 0 12px var(--accent-green);
    animation:pulse-dot 1.5s ease-in-out infinite;
  }
  
  @keyframes pulse-dot{
    0%, 100%{
      opacity:1;
      transform:scale(1);
      box-shadow:0 0 12px var(--accent-green);
    }
    50%{
      opacity:.6;
      transform:scale(.85);
      box-shadow:0 0 6px var(--accent-green);
    }
  }
  
  /* ==================== STAT CARDS ==================== */
  .statRow{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  
  .stat{
    background:linear-gradient(135deg, rgba(26,31,58,.6) 0%, rgba(13,19,33,.8) 100%);
    border:1.5px solid var(--accent-cyan);
    border-radius:8px;
    padding:16px 18px;
    font-family:'Michroma',sans-serif;
    font-weight:400;
    font-size:11px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-transform:uppercase;
    letter-spacing:.12em;
    box-shadow:0 4px 16px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    transition:all .2s ease;
    position:relative;
    overflow:hidden;
  }
  
  .stat::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    opacity:.5;
  }
  
  .stat:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(0,240,255,.3), inset 0 1px 0 rgba(255,255,255,.05);
    border-color:var(--accent-cyan);
  }
  
  .stat span{
    color:var(--accent-gold);
    font-size:20px;
    font-family:'Righteous',sans-serif;
    text-shadow:0 0 10px rgba(255,201,51,.6);
    letter-spacing:.05em;
  }
  
  /* ==================== BUTTONS ==================== */
  .btnRow{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  
  button{
    border:2px solid;
    border-radius:4px;
    padding:14px 20px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:.12em;
    text-transform:uppercase;
    font-size:12px;
    font-family:'Michroma',sans-serif;
    transition:all .15s ease;
    position:relative;
    overflow:hidden;
    background:var(--panel-mid);
  }
  
  button::before{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:0;
    height:0;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    transform:translate(-50%, -50%);
    transition:width .3s ease, height .3s ease;
  }
  
  button:active::before{
    width:300px;
    height:300px;
  }
  
  button:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 6px 24px currentColor;
  }
  
  button:active:not(:disabled){
    transform:translateY(1px);
  }
  
  /* Button variants */
  .btn-primary{
    background:linear-gradient(135deg, var(--accent-gold) 0%, #ff9500 100%);
    color:#000;
    border-color:var(--accent-gold);
    text-shadow:none;
    box-shadow:0 4px 16px rgba(255,201,51,.4), inset 0 1px 0 rgba(255,255,255,.3);
  }
  
  .btn-primary:hover:not(:disabled){
    box-shadow:0 6px 24px rgba(255,201,51,.6), inset 0 1px 0 rgba(255,255,255,.3);
  }
  
  .btn-secondary{
    background:var(--panel-mid);
    color:var(--accent-cyan);
    border-color:var(--accent-cyan);
    box-shadow:0 4px 16px rgba(0,0,0,.3), inset 0 0 20px rgba(0,240,255,.05);
  }
  
  .btn-secondary:hover:not(:disabled){
    background:var(--panel-light);
    box-shadow:0 6px 20px rgba(0,240,255,.3), inset 0 0 20px rgba(0,240,255,.08);
  }
  
  .btn-ghost{
    background:transparent;
    color:var(--accent-pink);
    border-color:var(--accent-pink);
    border-style:dashed;
  }
  
  .btn-ghost:hover:not(:disabled){
    background:rgba(255,46,151,.05);
    box-shadow:0 6px 20px rgba(255,46,151,.3);
  }
  
  button:disabled,
  button.locked{
    opacity:.3;
    cursor:not-allowed;
    transform:none !important;
    box-shadow:none !important;
  }
  
  /* ==================== DIVIDER ==================== */
  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent 0%, var(--accent-cyan) 50%, transparent 100%);
    margin:16px 0;
    box-shadow:0 0 8px rgba(0,240,255,.3);
  }
  
  /* ==================== HELP TEXT ==================== */
  .help-text{
    font-size:10px;
    color:var(--text-muted);
    line-height:1.6;
    text-transform:uppercase;
    letter-spacing:.08em;
    padding:12px;
    background:rgba(0,0,0,.3);
    border-radius:4px;
    border-left:2px solid var(--accent-cyan);
  }
  
  /* ==================== LOG ==================== */
  .log{
    flex:1;
    min-height:200px;
    overflow:auto;
    font-size:11px;
    background:rgba(0,0,0,.5);
    border:1.5px solid var(--accent-cyan);
    border-radius:6px;
    padding:16px;
    font-family:'Share Tech Mono',monospace;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.5), 0 0 16px rgba(0,240,255,.1);
  }
  
  .log::-webkit-scrollbar{
    width:6px;
  }
  
  .log::-webkit-scrollbar-track{
    background:rgba(0,0,0,.3);
  }
  
  .log::-webkit-scrollbar-thumb{
    background:var(--accent-cyan);
    border-radius:3px;
  }
  
  .log div{
    margin-bottom:8px;
    padding:6px 0;
    border-bottom:1px solid rgba(0,240,255,.1);
    line-height:1.5;
  }
  
  .log div:last-child{
    border-bottom:none;
  }
  
  .ok{
    color:var(--accent-green);
    font-weight:700;
    text-shadow:0 0 8px var(--accent-green);
  }
  
  .no{
    color:var(--accent-pink);
    font-weight:700;
    text-shadow:0 0 8px var(--accent-pink);
  }
  
  /* ==================== TABS ==================== */
  .tabs {
    display:flex;
    gap:0;
    margin-bottom:24px;
    border:1.5px solid var(--accent-cyan);
    border-radius:4px;
    overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
  }
  
  .tab-btn {
    flex:1;
    padding:14px 20px;
    background:var(--panel-dark);
    border:none;
    border-right:1.5px solid var(--accent-cyan);
    color:var(--text-secondary);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.12em;
    cursor:pointer;
    font-family:'Michroma',sans-serif;
    font-weight:400;
    transition:all .2s ease;
    position:relative;
  }
  
  .tab-btn:last-child{
    border-right:none;
  }
  
  .tab-btn::before{
    content:'';
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:2px;
    background:var(--accent-cyan);
    transform:scaleX(0);
    transition:transform .2s ease;
  }
  
  .tab-btn:hover{
    background:var(--panel-mid);
    color:var(--text-primary);
  }
  
  .tab-btn.active {
    background:linear-gradient(180deg, var(--panel-mid) 0%, var(--panel-dark) 100%);
    color:var(--accent-cyan);
    text-shadow:0 0 8px rgba(0,240,255,.5);
  }
  
  .tab-btn.active::before{
    transform:scaleX(1);
  }
  
  .tab-content {
    display:none;
  }
  
  .tab-content.active {
    display:block;
    animation:fade-in .3s ease;
  }
  
  @keyframes fade-in{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ==================== MOBILE ==================== */
  @media (max-width: 900px) and (orientation: portrait) {
    html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
    }
    
    #wrap {
      width:100vw;
      height:100vh;
      margin:0;
      padding:0;
      overflow:hidden;
      max-width:none;
    }
    
    #game {
      position:fixed;
      top:0;
      left:0;
      width:100vw;
      height:100vh;
      z-index:1;
    }
    
    #side {
      display:none !important;
    }
    
    #mobileMenuBtn{
      position:fixed;
      top:16px;
      right:16px;
      z-index:5;
      width:56px;
      height:56px;
      border-radius:8px;
      border:2px solid var(--accent-cyan);
      background:rgba(10,14,39,0.95);
      color:var(--accent-cyan);
      font-size:28px;
      box-shadow:0 4px 24px rgba(0,240,255,.4), inset 0 0 20px rgba(0,240,255,.05);
      backdrop-filter:blur(10px);
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    
    #mobileMenuBtn:active{
      transform:scale(.95);
    }
    
    #side{
      position:fixed;
      left:0;
      right:0;
      bottom:-100%;
      height:80vh;
      max-height:80vh;
      background:linear-gradient(180deg, var(--panel-dark) 0%, var(--bg-deep) 100%);
      border-top:2px solid var(--accent-cyan);
      border-left:none;
      z-index:4;
      transition:bottom .4s cubic-bezier(.68,-.55,.27,1.55);
      overflow-y:auto;
      padding:24px 20px;
      display:flex !important;
      box-shadow:0 -8px 32px rgba(0,240,255,.3);
    }
    
    #side.open{
      bottom:0;
    }
    
    /* Mobile HUD pills */
    #hud-bottom-left{
      position:fixed;
      left:16px;
      bottom:16px;
      z-index:3;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    
    #hud-bottom-right{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:3;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      pointer-events:none;
    }
    
    .hud-pill{
      background:rgba(10,14,39,0.95);
      border:2px solid var(--accent-cyan);
      border-radius:8px;
      color:var(--accent-gold);
      padding:12px 16px;
      font-size:13px;
      font-weight:700;
      min-width:90px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,240,255,.3), inset 0 0 20px rgba(0,240,255,.05);
      font-family:'Michroma',sans-serif;
      text-transform:uppercase;
      letter-spacing:.1em;
      text-shadow:0 0 10px var(--accent-gold);
      backdrop-filter:blur(10px);
    }
    
    .hud-pill span{
      display:block;
      font-size:20px;
      margin-top:4px;
      font-family:'Righteous',sans-serif;
    }
  }

  @media (min-width: 900px) {
    #mobileMenuBtn, #hud-bottom-left, #hud-bottom-right {
      display:none !important;
    }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="game"><canvas id="c"></canvas></div>
 
  <!-- Mobile HUD -->
  <div id="hud-bottom-left">
    <div class="hud-pill">

<script>
/* ===================== */
/* AUDIO + HAPTICS */
/* ===================== */
let audioCtx=null;
function ensureAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq=300,dur=0.06){
  try{
    ensureAudio();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value=freq; o.start();
    g.gain.setValueAtTime(0.18,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);
    o.stop(audioCtx.currentTime+dur);
  }catch(_){}
}
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

/* ===================== */
/* CANVAS + DPI */
/* ===================== */
const c=document.getElementById("c");
const ctx=c.getContext("2d",{alpha:false});
let GAME_W=0, GAME_H=0, DPR=1;
function resize(){
  DPR = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  GAME_W = rect.width;
  GAME_H = rect.height;
  c.width = Math.floor(rect.width * DPR);
  c.height = Math.floor(rect.height * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize",resize);
resize();

/* ===================== */
/* UI refs */
/* ===================== */
const lvlEl=document.getElementById("lvl");
const pinsEl=document.getElementById("pins");
const shotsEl=document.getElementById("shots");
const windEl=document.getElementById("wind");
const streakEl=document.getElementById("streak");
const ptsEl=document.getElementById("pts");
const logEl=document.getElementById("log");
const nextBtn=document.getElementById("nextBtn");
const walletBtn=document.getElementById("walletBtn");
const claimBtn=document.getElementById("claimBtn");
const resetBtn=document.getElementById("resetBtn");
const practiceBtn=document.getElementById("practiceBtn");
const bgBtn=document.getElementById("bgBtn");
const spinBtn=document.getElementById("spinBtn");
const saveLine=document.getElementById("saveLine");
const mobilePinsEl = document.getElementById("mobile-pins");
const mobileStreakEl = document.getElementById("mobile-streak");
const mobileLvlEl = document.getElementById("mobile-lvl");
const mobileShotsEl = document.getElementById("mobile-shots");
const walletPtsEl = document.getElementById("wallet-pts");

/* ===================== */
/* HELPERS */
/* ===================== */
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const rand=(a,b)=>a+Math.random()*(b-a);
function log(msg,cls=""){
  const div=document.createElement("div");
  div.innerHTML = cls ? `<span class="${cls}">${msg}</span>` : msg;
  logEl.prepend(div);
}
function updateClaimState(){
  if(walletPubkey && rftPoints > 0){
    claimBtn.classList.remove("locked");
    claimBtn.disabled = false;
  }else{
    claimBtn.classList.add("locked");
    claimBtn.disabled = true;
  }
  ptsEl.textContent = rftPoints;
  walletPtsEl.textContent = rftPoints;
}
function buildClaimMessage(wallet, points){
  const nonce = Date.now();
  return [
    "TUMBLEVERSE RFT CLAIM",
    `Wallet: ${wallet}`,
    `Points: ${points}`,
    `Timestamp: ${Date.now()}`,
    `Nonce: ${nonce}`,
    "This message proves ownership of this wallet.",
    "No transaction is executed."
  ].join("\n");
}

/* ===================== */
/* GAME STATE */
/* ===================== */
let level=1;
const baseShots=3;
let shots=baseShots;
let streak=0;
let hitsThisShot=0;
let bonusShotsThisLevel=0;
const BONUS_CAP=1;
let pins=[];
let balls=[];
let wind=0;
let windT=0;
let walletPubkey=null;
let saveKey=null;
let bgMode="day";
let spinMode="low";
let practiceUsed=false;
let levelCleared=false;
let levelClearTimer = 0;
let shotClock = 0;
const SHOT_TIME = 5.0;
let rftPoints=0;
let shotInProgress=false;
let shotHadHit=false;
let claimablePoints = 0;
let lastClaimSig = null;

/* Particle system for visual effects */
let particles = [];

/* Background elements */
let spaceships = [];
let planets = [];

/* Initialize background elements */
function initBackgroundElements(){
  // Create spaceships
  spaceships = [];
  for(let i = 0; i < 5; i++){
    const angle = rand(0, Math.PI * 2);
    const speed = rand(15, 40);
    spaceships.push({
      x: rand(0, GAME_W),
      y: rand(GAME_H * 0.08, GAME_H * 0.45),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: rand(20, 45),
      type: Math.floor(rand(0, 3)), // 3 ship types
      phase: rand(0, Math.PI * 2),
      layer: rand(0.4, 1), // depth layer
      rotation: angle,
      rotSpeed: rand(-0.15, 0.15),
      thrustPhase: rand(0, Math.PI * 2),
      color: ['#00f0ff', '#ff2e97', '#ffc933'][i % 3]
    });
  }
  
  // Create planets
  planets = [];
  for(let i = 0; i < 3; i++){
    planets.push({
      x: rand(GAME_W * 0.1, GAME_W * 0.9),
      y: rand(GAME_H * 0.05, GAME_H * 0.35),
      size: rand(40, 80),
      color: ['#ff2e97', '#00f0ff', '#ffc933'][i % 3],
      rotation: rand(0, Math.PI * 2),
      rotSpeed: rand(0.1, 0.3),
      hasRing: Math.random() > 0.5,
      layer: rand(0.2, 0.6) // depth layer
    });
  }
}

/* ===================== */
/* CHARACTERS */
/* ===================== */
const characters = {
  mylo: { x: () => GAME_W * 0.5, y: () => GAME_H * 0.88, mood: "idle", glow: 0 },
  meechie: { visible: false, timer: 0 },
  breezy: { x: () => GAME_W * 0.5, y: () => GAME_H * 0.22, strength: 0 }
};

/* ===================== */
/* DIFFICULTY CURVE */
/* ===================== */
function pinsForLevel(lvl){
  if(lvl===1) return 4;
  return clamp(4 + Math.floor((lvl-1)*1.2), 4, 20);
}
function windStrength(lvl){
  if(lvl < 5) return clamp(0.10 + (lvl-1)*0.02, 0.10, 0.18);
  return clamp(0.18 + (lvl-4)*0.10, 0.18, 0.95);
}

/* ===================== */
/* SPAWN PINS */
/* ===================== */
function spawnPins(){
  pins.length = 0;
  const count = pinsForLevel(level);
  const area = { x0: GAME_W * 0.16, x1: GAME_W * 0.84, y0: GAME_H * 0.18, y1: GAME_H * 0.48 };
  const minDist = 54;
  let tries = 0;
  while (pins.length < count && tries < 2000) {
    tries++;
    const x = rand(area.x0, area.x1);
    const y = rand(area.y0, area.y1);
    let ok = true;
    for (const p of pins) {
      if (Math.hypot(p.x - x, p.y - y) < minDist) { ok = false; break; }
    }
    if (!ok) continue;
    const r = 18;
    pins.push({
      x, y, r, alive: true,
      vx: rand(-40, 40), vy: rand(-28, 28),
      floatAngle: rand(0, Math.PI * 2), floatSpeed: rand(1.0, 1.9), floatTurn: rand(0.15, 0.35),
      mass: rand(0.9, 1.2),
      pulsePhase: rand(0, Math.PI * 2)
    });
  }
  practiceUsed = false;
  levelCleared = false;
  levelClearTimer = 0;
  nextBtn.classList.add("locked");
  nextBtn.disabled = true;
  practiceBtn.textContent = "PRACTICE (1)";
  practiceBtn.classList.remove("locked");
  practiceBtn.disabled = false;
  bonusShotsThisLevel = 0;
}

/* ===================== */
/* PARTICLE SYSTEM */
/* ===================== */
function createParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + rand(-0.2, 0.2);
    const speed = rand(80, 160);
    const isSharp = Math.random() > 0.5; // Some particles are crystal shards
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      color,
      size: rand(3, 7),
      rotation: rand(0, Math.PI * 2),
      rotSpeed: rand(-0.2, 0.2),
      isShard: isSharp
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt; // gravity
    p.vx *= 0.98;
    p.life -= dt * 1.8;
    if(p.rotation !== undefined) p.rotation += (p.rotSpeed || 0) * dt * 10;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.8;
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.color;
    
    if(p.isShard){
      // Draw crystal shard (diamond/triangle shape)
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation || 0);
      
      const size = p.size * p.life * 1.2;
      ctx.fillStyle = p.color;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1.5;
      
      // Diamond shard shape
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.5, 0);
      ctx.lineTo(0, size);
      ctx.lineTo(-size * 0.5, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      
      // Inner glow
      ctx.globalAlpha = p.life * 0.5;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.5);
      ctx.lineTo(size * 0.25, 0);
      ctx.lineTo(0, size * 0.5);
      ctx.lineTo(-size * 0.25, 0);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    } else {
      // Regular circular particle
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

/* ===================== */
/* ENHANCED VISUALS */
/* ===================== */
function drawBackground(){
  // Deep space gradient
  const g = ctx.createLinearGradient(0, 0, 0, GAME_H);
  g.addColorStop(0, '#0a0e27');
  g.addColorStop(0.3, '#1a1f3a');
  g.addColorStop(0.7, '#0f1525');
  g.addColorStop(1, '#050810');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Animated stars with depth layers
  ctx.save();
  for(let layer = 0; layer < 3; layer++){
    const layerSpeed = (layer + 1) * 0.3;
    const layerAlpha = 0.2 + layer * 0.15;
    const layerSize = 1 + layer * 0.8;
    
    for(let i = 0; i < 60; i++){
      const baseX = (i * 173.5 + layer * 50) % GAME_W;
      const baseY = (i * 89.3 + layer * 30) % (GAME_H * 0.65);
      const x = baseX + Math.sin(windT * layerSpeed + i) * (2 + layer * 2);
      const y = baseY;
      const twinkle = 0.4 + Math.sin(windT * (2 + layer) + i * 0.7) * 0.6;
      
      ctx.globalAlpha = layerAlpha * twinkle;
      ctx.fillStyle = i % 5 === 0 ? '#00f0ff' : i % 5 === 1 ? '#ff2e97' : i % 5 === 2 ? '#ffc933' : '#ffffff';
      ctx.shadowBlur = 3 + layer * 2;
      ctx.shadowColor = ctx.fillStyle;
      ctx.beginPath();
      ctx.arc(x, y, layerSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();

  // Nebula clouds
  ctx.save();
  ctx.globalAlpha = 0.06;
  const nebulaX = GAME_W * 0.7 + Math.sin(windT * 0.3) * 60;
  const nebulaY = GAME_H * 0.3;
  const nebula = ctx.createRadialGradient(nebulaX, nebulaY, 0, nebulaX, nebulaY, 300);
  nebula.addColorStop(0, '#ff2e97');
  nebula.addColorStop(0.5, '#00f0ff');
  nebula.addColorStop(1, 'transparent');
  ctx.fillStyle = nebula;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();

  // Perspective grid (enhanced)
  ctx.save();
  ctx.strokeStyle = 'rgba(0,240,255,.06)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 2;
  ctx.shadowColor = 'rgba(0,240,255,.3)';
  
  const gridSize = 60;
  const horizonY = GAME_H * 0.5;
  
  // Vertical lines with perspective
  for(let x = -gridSize; x < GAME_W + gridSize; x += gridSize){
    const offset = Math.sin(windT * 0.5) * 20;
    ctx.globalAlpha = 0.06;
    ctx.beginPath();
    ctx.moveTo(x + offset, horizonY);
    ctx.lineTo(x, GAME_H);
    ctx.stroke();
  }
  
  // Horizontal lines
  for(let i = 0; i < 10; i++){
    const y = horizonY + (GAME_H - horizonY) * (i / 10);
    const fade = i / 10;
    ctx.globalAlpha = 0.06 * (1 - fade * 0.7);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(GAME_W, y);
    ctx.stroke();
  }
  ctx.restore();

  // Atmospheric glow (bottom)
  const bottomGlow = ctx.createRadialGradient(GAME_W*0.5, GAME_H, 0, GAME_W*0.5, GAME_H, GAME_H*0.6);
  bottomGlow.addColorStop(0, 'rgba(0,240,255,.12)');
  bottomGlow.addColorStop(0.5, 'rgba(0,240,255,.04)');
  bottomGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bottomGlow;
  ctx.fillRect(0, GAME_H * 0.4, GAME_W, GAME_H * 0.6);

  // Top mystical aura
  const topGlow = ctx.createRadialGradient(GAME_W*0.5, 0, 0, GAME_W*0.5, 0, GAME_H*0.5);
  topGlow.addColorStop(0, 'rgba(255,46,151,.08)');
  topGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, 0, GAME_W, GAME_H * 0.5);
  
  // Draw planets (behind everything)
  drawPlanets();
  
  // Draw spaceships
  drawSpaceships();
}

function drawPlanets(){
  ctx.save();
  for(const planet of planets){
    const wobble = Math.sin(windT * 0.5 + planet.rotation) * 3;
    const x = planet.x + wobble;
    const y = planet.y;
    
    ctx.globalAlpha = 0.15 * planet.layer;
    
    // Planet shadow
    ctx.shadowBlur = 40;
    ctx.shadowColor = planet.color;
    
    // Planet body
    const planetGrad = ctx.createRadialGradient(
      x - planet.size * 0.2, 
      y - planet.size * 0.2, 
      0, 
      x, 
      y, 
      planet.size
    );
    planetGrad.addColorStop(0, planet.color);
    planetGrad.addColorStop(0.7, `${planet.color}88`);
    planetGrad.addColorStop(1, `${planet.color}22`);
    ctx.fillStyle = planetGrad;
    ctx.beginPath();
    ctx.arc(x, y, planet.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Planet surface details (craters/continents)
    ctx.globalAlpha = 0.08 * planet.layer;
    for(let i = 0; i < 5; i++){
      const craterAngle = (i / 5) * Math.PI * 2 + planet.rotation;
      const craterDist = planet.size * 0.4;
      const cx = x + Math.cos(craterAngle) * craterDist;
      const cy = y + Math.sin(craterAngle) * craterDist;
      const craterSize = planet.size * rand(0.15, 0.3);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy, craterSize, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Ring if applicable
    if(planet.hasRing){
      ctx.globalAlpha = 0.12 * planet.layer;
      ctx.strokeStyle = planet.color;
      ctx.lineWidth = planet.size * 0.15;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.ellipse(x, y, planet.size * 1.6, planet.size * 0.4, planet.rotation * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawSpaceships(){
  ctx.save();
  for(const ship of spaceships){
    // Update position with directional movement
    ship.x += ship.vx * 0.016 * ship.layer;
    ship.y += ship.vy * 0.016 * ship.layer;
    ship.rotation += ship.rotSpeed * 0.016;
    
    // Wrap around screen edges
    const margin = ship.size * 3;
    if(ship.x < -margin) ship.x = GAME_W + margin;
    if(ship.x > GAME_W + margin) ship.x = -margin;
    if(ship.y < -margin) ship.y = GAME_H * 0.5 + margin;
    if(ship.y > GAME_H * 0.5 + margin) ship.y = -margin;
    
    const bobbing = Math.sin(windT * 2 + ship.phase) * 3 * ship.layer;
    const x = ship.x;
    const y = ship.y + bobbing;
    
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ship.rotation);
    
    const alpha = 0.35 + ship.layer * 0.5;
    ctx.globalAlpha = alpha;
    
    // Three realistic ship designs
    if(ship.type === 0){
      // Sleek Explorer Ship - Curved futuristic design
      ctx.shadowBlur = 20;
      ctx.shadowColor = ship.color;
      
      // Main hull body with perspective
      const hullGrad = ctx.createLinearGradient(-ship.size * 0.8, -ship.size * 0.3, -ship.size * 0.8, ship.size * 0.3);
      hullGrad.addColorStop(0, `${ship.color}00`);
      hullGrad.addColorStop(0.3, `${ship.color}66`);
      hullGrad.addColorStop(0.5, `${ship.color}99`);
      hullGrad.addColorStop(0.7, `${ship.color}66`);
      hullGrad.addColorStop(1, `${ship.color}00`);
      ctx.fillStyle = hullGrad;
      
      // Streamlined hull
      ctx.beginPath();
      ctx.moveTo(ship.size, 0);
      ctx.bezierCurveTo(ship.size * 0.6, -ship.size * 0.35, -ship.size * 0.4, -ship.size * 0.35, -ship.size * 0.8, -ship.size * 0.15);
      ctx.lineTo(-ship.size * 0.8, ship.size * 0.15);
      ctx.bezierCurveTo(-ship.size * 0.4, ship.size * 0.35, ship.size * 0.6, ship.size * 0.35, ship.size, 0);
      ctx.closePath();
      ctx.fill();
      
      // Hull outline
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Cockpit window
      ctx.fillStyle = ship.color;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.ellipse(ship.size * 0.5, 0, ship.size * 0.15, ship.size * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Wing details
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.2, -ship.size * 0.3);
      ctx.lineTo(ship.size * 0.1, -ship.size * 0.45);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.2, ship.size * 0.3);
      ctx.lineTo(ship.size * 0.1, ship.size * 0.45);
      ctx.stroke();
      
      // Engine thrusters
      const thrustPulse = Math.sin(windT * 8 + ship.thrustPhase) * 0.3 + 0.7;
      ctx.globalAlpha = alpha * thrustPulse;
      const thrustGrad = ctx.createRadialGradient(-ship.size * 0.8, 0, 0, -ship.size * 1.2, 0, ship.size * 0.4);
      thrustGrad.addColorStop(0, ship.color);
      thrustGrad.addColorStop(0.4, `${ship.color}88`);
      thrustGrad.addColorStop(1, `${ship.color}00`);
      ctx.fillStyle = thrustGrad;
      ctx.beginPath();
      ctx.ellipse(-ship.size * 0.8, 0, ship.size * 0.5, ship.size * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Hull panel lines
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.4, -ship.size * 0.15);
      ctx.lineTo(-ship.size * 0.3, -ship.size * 0.15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.4, ship.size * 0.15);
      ctx.lineTo(-ship.size * 0.3, ship.size * 0.15);
      ctx.stroke();
    }
    else if(ship.type === 1){
      // Heavy Cruiser - Angular military design
      ctx.shadowBlur = 20;
      ctx.shadowColor = ship.color;
      
      // Main body with 3D perspective
      const bodyGrad = ctx.createLinearGradient(0, -ship.size * 0.4, 0, ship.size * 0.4);
      bodyGrad.addColorStop(0, `${ship.color}44`);
      bodyGrad.addColorStop(0.5, `${ship.color}99`);
      bodyGrad.addColorStop(1, `${ship.color}44`);
      ctx.fillStyle = bodyGrad;
      
      // Central hull
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.8, 0);
      ctx.lineTo(ship.size * 0.4, -ship.size * 0.25);
      ctx.lineTo(-ship.size * 0.6, -ship.size * 0.25);
      ctx.lineTo(-ship.size * 0.8, -ship.size * 0.15);
      ctx.lineTo(-ship.size * 0.8, ship.size * 0.15);
      ctx.lineTo(-ship.size * 0.6, ship.size * 0.25);
      ctx.lineTo(ship.size * 0.4, ship.size * 0.25);
      ctx.closePath();
      ctx.fill();
      
      // Hull edges
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      
      // Bridge/Command tower
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(ship.size * 0.1, -ship.size * 0.35, ship.size * 0.3, ship.size * 0.2);
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(ship.size * 0.1, -ship.size * 0.35, ship.size * 0.3, ship.size * 0.2);
      
      // Weapon hardpoints
      ctx.fillStyle = ship.color;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(ship.size * 0.6, -ship.size * 0.25, ship.size * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ship.size * 0.6, ship.size * 0.25, ship.size * 0.08, 0, Math.PI * 2);
      ctx.fill();
      
      // Engine bay indicators
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = ship.color;
      ctx.fillRect(-ship.size * 0.75, -ship.size * 0.12, ship.size * 0.15, ship.size * 0.08);
      ctx.fillRect(-ship.size * 0.75, ship.size * 0.04, ship.size * 0.15, ship.size * 0.08);
      
      // Engine thrust
      const thrustPulse = Math.sin(windT * 8 + ship.thrustPhase) * 0.3 + 0.7;
      ctx.globalAlpha = alpha * thrustPulse;
      const thrustGrad = ctx.createRadialGradient(-ship.size * 0.8, -ship.size * 0.08, 0, -ship.size * 1.3, -ship.size * 0.08, ship.size * 0.4);
      thrustGrad.addColorStop(0, ship.color);
      thrustGrad.addColorStop(0.5, `${ship.color}66`);
      thrustGrad.addColorStop(1, `${ship.color}00`);
      ctx.fillStyle = thrustGrad;
      ctx.beginPath();
      ctx.ellipse(-ship.size * 0.8, -ship.size * 0.08, ship.size * 0.5, ship.size * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = thrustGrad;
      ctx.beginPath();
      ctx.ellipse(-ship.size * 0.8, ship.size * 0.08, ship.size * 0.5, ship.size * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Hull panel details
      ctx.globalAlpha = alpha * 0.4;
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 1;
      for(let i = 0; i < 4; i++){
        const px = ship.size * 0.3 - i * ship.size * 0.25;
        ctx.beginPath();
        ctx.moveTo(px, -ship.size * 0.2);
        ctx.lineTo(px, ship.size * 0.2);
        ctx.stroke();
      }
    }
    else {
      // Transport Vessel - Bulky cargo design
      ctx.shadowBlur = 20;
      ctx.shadowColor = ship.color;
      
      // Cargo containers (main body)
      const containerGrad = ctx.createLinearGradient(0, -ship.size * 0.4, 0, ship.size * 0.4);
      containerGrad.addColorStop(0, `${ship.color}33`);
      containerGrad.addColorStop(0.5, `${ship.color}88`);
      containerGrad.addColorStop(1, `${ship.color}33`);
      
      // Main cargo sections
      for(let i = 0; i < 3; i++){
        const cx = ship.size * 0.1 - i * ship.size * 0.35;
        ctx.fillStyle = containerGrad;
        ctx.fillRect(cx, -ship.size * 0.35, ship.size * 0.3, ship.size * 0.7);
        ctx.strokeStyle = ship.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(cx, -ship.size * 0.35, ship.size * 0.3, ship.size * 0.7);
        
        // Container details
        ctx.globalAlpha = alpha * 0.5;
        ctx.strokeStyle = ship.color;
        ctx.lineWidth = 1;
        ctx.strokeRect(cx + ship.size * 0.05, -ship.size * 0.3, ship.size * 0.2, ship.size * 0.6);
      }
      
      ctx.globalAlpha = alpha;
      
      // Cockpit section
      const cockpitGrad = ctx.createLinearGradient(ship.size * 0.4, -ship.size * 0.25, ship.size * 0.4, ship.size * 0.25);
      cockpitGrad.addColorStop(0, `${ship.color}55`);
      cockpitGrad.addColorStop(0.5, `${ship.color}AA`);
      cockpitGrad.addColorStop(1, `${ship.color}55`);
      ctx.fillStyle = cockpitGrad;
      
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.9, 0);
      ctx.lineTo(ship.size * 0.5, -ship.size * 0.3);
      ctx.lineTo(ship.size * 0.3, -ship.size * 0.3);
      ctx.lineTo(ship.size * 0.3, ship.size * 0.3);
      ctx.lineTo(ship.size * 0.5, ship.size * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Cockpit windows
      ctx.fillStyle = ship.color;
      ctx.shadowBlur = 15;
      for(let i = 0; i < 2; i++){
        const wy = i === 0 ? -ship.size * 0.15 : ship.size * 0.15;
        ctx.beginPath();
        ctx.ellipse(ship.size * 0.6, wy, ship.size * 0.12, ship.size * 0.08, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Communication array
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ship.size * 0.4, -ship.size * 0.3);
      ctx.lineTo(ship.size * 0.4, -ship.size * 0.5);
      ctx.stroke();
      ctx.fillStyle = ship.color;
      ctx.beginPath();
      ctx.arc(ship.size * 0.4, -ship.size * 0.52, ship.size * 0.06, 0, Math.PI * 2);
      ctx.fill();
      
      // Engine thrust (dual engines)
      const thrustPulse = Math.sin(windT * 8 + ship.thrustPhase) * 0.3 + 0.7;
      ctx.globalAlpha = alpha * thrustPulse;
      const thrustGrad = ctx.createRadialGradient(-ship.size * 0.7, 0, 0, -ship.size * 1.2, 0, ship.size * 0.35);
      thrustGrad.addColorStop(0, ship.color);
      thrustGrad.addColorStop(0.5, `${ship.color}77`);
      thrustGrad.addColorStop(1, `${ship.color}00`);
      ctx.fillStyle = thrustGrad;
      ctx.beginPath();
      ctx.ellipse(-ship.size * 0.7, -ship.size * 0.2, ship.size * 0.45, ship.size * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-ship.size * 0.7, ship.size * 0.2, ship.size * 0.45, ship.size * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Status lights along hull
      ctx.globalAlpha = alpha;
      const lightPulse = Math.sin(windT * 4 + ship.phase) * 0.5 + 0.5;
      ctx.globalAlpha = alpha * lightPulse;
      ctx.fillStyle = ship.color;
      for(let i = 0; i < 5; i++){
        const lx = ship.size * 0.2 - i * ship.size * 0.2;
        ctx.beginPath();
        ctx.arc(lx, ship.size * 0.38, ship.size * 0.04, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    ctx.restore();
  }
  ctx.restore();
}

function drawBreezy() {
  const baseX = characters.breezy.x();
  const y = characters.breezy.y();
  const x = baseX + wind * 140;
  const strength = clamp(Math.abs(wind), 0, 1);
  
  ctx.save();
  ctx.globalAlpha = 0.6 + strength * 0.3;
  
  // Enhanced wind spirit with better detail
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#00f0ff';
  
  // Main cloud body with gradient
  const cloudGrad = ctx.createRadialGradient(x, y, 0, x, y, 18);
  cloudGrad.addColorStop(0, '#00f0ff');
  cloudGrad.addColorStop(0.6, '#0088cc');
  cloudGrad.addColorStop(1, 'rgba(0,240,255,0.3)');
  ctx.fillStyle = cloudGrad;
  ctx.beginPath();
  ctx.arc(x, y, 16 + strength * 8, 0, Math.PI * 2);
  ctx.fill();
  
  // Side puffs
  ctx.globalAlpha = (0.6 + strength * 0.3) * 0.75;
  ctx.beginPath();
  ctx.arc(x - 11, y + 5, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 11, y + 5, 11, 0, Math.PI * 2);
  ctx.fill();
  
  // Wind trail lines (more dynamic)
  ctx.globalAlpha = 0.75 + strength * 0.25;
  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  const dir = Math.sign(wind) || 1;
  const len = 35 + strength * 60;
  
  for (let i = 0; i < 5; i++) {
    const yy = y + 24 + i * 8;
    const wobble = Math.sin(windT * 3.5 + i * 0.7) * 4;
    const phase = Math.sin(windT * 4 + i) * 0.5 + 0.5;
    ctx.shadowBlur = 18;
    ctx.globalAlpha = (0.75 + strength * 0.25) * phase;
    ctx.beginPath();
    ctx.moveTo(x - dir * 8, yy);
    ctx.quadraticCurveTo(
      x + dir * (len * 0.45), 
      yy + wobble, 
      x + dir * (len + phase * 20), 
      yy + wobble * 0.6
    );
    ctx.stroke();
  }
  
  // Enhanced face
  ctx.shadowBlur = 10;
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0a0e27';
  
  // Eyes
  ctx.beginPath();
  ctx.arc(x - 6, y - 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 6, y - 2, 3, 0, Math.PI * 2);
  ctx.fill();
  
  // Mouth (blowing)
  ctx.strokeStyle = '#0a0e27';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(x + dir * 4, y + 6, 5, 0, Math.PI);
  ctx.stroke();
  
  ctx.restore();
}

function drawVectorPin(p){
  ctx.save();
  ctx.translate(p.x, p.y);
  
  // Pulsing energy effect
  const pulse = Math.sin(windT * 3 + p.pulsePhase) * 0.15 + 1;
  const energyPulse = Math.sin(windT * 4 + p.pulsePhase) * 0.5 + 0.5;
  
  // Outer energy aura
  ctx.globalAlpha = 0.3 * energyPulse;
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#00ff88';
  const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, p.r * 1.5);
  auraGrad.addColorStop(0, 'rgba(0,255,136,0.4)');
  auraGrad.addColorStop(0.5, 'rgba(0,255,136,0.2)');
  auraGrad.addColorStop(1, 'rgba(0,255,136,0)');
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(0, 0, p.r * 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  
  // Rotate crystal for dynamic look
  ctx.rotate(windT * 0.3 + p.pulsePhase);
  
  // Crystal structure - hexagonal with facets
  const sides = 6;
  const facets = [];
  
  // Generate facet points
  for(let i = 0; i < sides; i++){
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
    const nextAngle = ((i + 1) / sides) * Math.PI * 2 - Math.PI / 2;
    const x1 = Math.cos(angle) * p.r;
    const y1 = Math.sin(angle) * p.r;
    const x2 = Math.cos(nextAngle) * p.r;
    const y2 = Math.sin(nextAngle) * p.r;
    facets.push({x1, y1, x2, y2, angle});
  }
  
  // Draw crystal body with gradient fills
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ff88';
  
  for(let i = 0; i < facets.length; i++){
    const f = facets[i];
    const brightness = (Math.sin(f.angle + windT * 2) * 0.3 + 0.7) * pulse;
    
    // Facet gradient
    const midX = (f.x1 + f.x2) / 2;
    const midY = (f.y1 + f.y2) / 2;
    const facetGrad = ctx.createLinearGradient(0, 0, midX, midY);
    facetGrad.addColorStop(0, `rgba(0,255,136,${0.4 * brightness})`);
    facetGrad.addColorStop(1, `rgba(0,200,110,${0.2 * brightness})`);
    
    ctx.fillStyle = facetGrad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(f.x1, f.y1);
    ctx.lineTo(f.x2, f.y2);
    ctx.closePath();
    ctx.fill();
    
    // Facet outline
    ctx.strokeStyle = `rgba(0,255,136,${0.8 * brightness})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(f.x1, f.y1);
    ctx.lineTo(f.x2, f.y2);
    ctx.stroke();
  }
  
  // Outer crystal edge (hexagon outline)
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 3;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  for(let i = 0; i < sides; i++){
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * p.r;
    const y = Math.sin(angle) * p.r;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  
  // Inner crystal core (pulsing energy center)
  const coreSize = p.r * 0.25;
  ctx.shadowBlur = 25;
  const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreSize);
  coreGrad.addColorStop(0, `rgba(0,255,136,${0.9 * pulse})`);
  coreGrad.addColorStop(0.5, `rgba(0,255,136,${0.6 * pulse})`);
  coreGrad.addColorStop(1, `rgba(0,255,136,${0.2 * pulse})`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(0, 0, coreSize * pulse, 0, Math.PI * 2);
  ctx.fill();
  
  // Energy lines from core to edges
  ctx.strokeStyle = `rgba(0,255,136,${0.4 * energyPulse})`;
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 10;
  for(let i = 0; i < sides; i++){
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * p.r * 0.8;
    const y = Math.sin(angle) * p.r * 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(x, y);
    ctx.stroke();
  }
  
  // Highlight sparkles on vertices
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ffffff';
  for(let i = 0; i < sides; i++){
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
    const sparklePhase = Math.sin(windT * 5 + p.pulsePhase + i) * 0.5 + 0.5;
    ctx.globalAlpha = 0.6 * sparklePhase;
    const x = Math.cos(angle) * p.r;
    const y = Math.sin(angle) * p.r;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  ctx.restore();
}

function drawVectorBall(ball, alpha=1){
  ctx.save();
  ctx.globalAlpha = alpha;
  
  // Enhanced trail
  for(const t of ball.trail){
    const a = clamp(t.life/0.4, 0, 1);
    ctx.globalAlpha = alpha * 0.5 * a;
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#ffc933';
    
    const trailGrad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, ball.r * 0.7);
    trailGrad.addColorStop(0, '#ffc933');
    trailGrad.addColorStop(1, 'rgba(255,201,51,0)');
    ctx.fillStyle = trailGrad;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * 0.7 * (1-a*0.3), 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.globalAlpha = alpha;
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.rot);
  
  // Tumbleweed with enhanced detail
  ctx.shadowBlur = 24;
  ctx.shadowColor = '#ffc933';
  ctx.strokeStyle = '#ffc933';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
  ctx.stroke();
  
  // Inner glow
  const ballGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, ball.r);
  ballGrad.addColorStop(0, 'rgba(255,201,51,0.4)');
  ballGrad.addColorStop(0.6, 'rgba(255,201,51,0.15)');
  ballGrad.addColorStop(1, 'rgba(255,201,51,0)');
  ctx.fillStyle = ballGrad;
  ctx.fill();
  
  // Detailed tumbleweed structure
  ctx.shadowBlur = 14;
  ctx.lineWidth = 2.5;
  
  // Outer spokes
  for(let i = 0; i < 12; i++){
    const a = i * Math.PI / 6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * ball.r * 0.15, Math.sin(a) * ball.r * 0.15);
    ctx.lineTo(Math.cos(a) * ball.r * 1.15, Math.sin(a) * ball.r * 1.15);
    ctx.stroke();
  }
  
  // Inner cross structure
  ctx.lineWidth = 3;
  for(let i = 0; i < 4; i++){
    const a = i * Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * ball.r * 0.65, Math.sin(a) * ball.r * 0.65);
    ctx.stroke();
  }
  
  // Center core
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffc933';
  ctx.beginPath();
  ctx.arc(0, 0, ball.r * 0.2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

function drawMylo() {
  const x = characters.mylo.x();
  const y = characters.mylo.y();
  
  // Draw desert yard/ground first
  drawDesertYard(x, y);
  
  // Enhanced glow when happy
  if (characters.mylo.glow > 0.02) {
    ctx.save();
    ctx.globalAlpha = characters.mylo.glow * 0.4;
    const glowGrad = ctx.createRadialGradient(x, y - 20, 0, x, y - 20, 60);
    glowGrad.addColorStop(0, '#ffc933');
    glowGrad.addColorStop(1, 'rgba(255,201,51,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(x, y - 20, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  ctx.save();
  
  // Enhanced shadow
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.ellipse(x, y + 20, 20, 7, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#000';
  ctx.fill();
  ctx.globalAlpha = 1;
  
  // Legs with detail
  ctx.fillStyle = '#6d4028';
  ctx.strokeStyle = '#4a2a1a';
  ctx.lineWidth = 1.5;
  ctx.fillRect(x - 9, y + 6, 7, 16);
  ctx.strokeRect(x - 9, y + 6, 7, 16);
  ctx.fillRect(x + 2, y + 6, 7, 16);
  ctx.strokeRect(x + 2, y + 6, 7, 16);
  
  // Boots
  ctx.fillStyle = '#2a1a0f';
  ctx.fillRect(x - 10, y + 20, 8, 4);
  ctx.fillRect(x + 2, y + 20, 8, 4);
  
  // Body (vest)
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x - 15, y - 2, 30, 14);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - 15, y - 2, 30, 14);
  
  // Shirt (yellow with detail)
  ctx.fillStyle = '#ffc933';
  ctx.fillRect(x - 17, y - 22, 34, 24);
  ctx.strokeStyle = '#cc9900';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - 17, y - 22, 34, 24);
  
  // Collar
  ctx.fillStyle = '#cc9900';
  ctx.beginPath();
  ctx.moveTo(x - 8, y - 22);
  ctx.lineTo(x - 12, y - 18);
  ctx.lineTo(x, y - 18);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 8, y - 22);
  ctx.lineTo(x + 12, y - 18);
  ctx.lineTo(x, y - 18);
  ctx.fill();
  
  // Head
  ctx.beginPath();
  ctx.arc(x, y - 38, 15, 0, Math.PI * 2);
  ctx.fillStyle = '#8B5A3C';
  ctx.shadowBlur = 4;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Hat (enhanced cowboy hat)
  ctx.fillStyle = '#1a1a1a';
  // Brim
  ctx.beginPath();
  ctx.ellipse(x, y - 44, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Crown
  ctx.beginPath();
  ctx.arc(x, y - 46, 16, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(x - 16, y - 52, 32, 6);
  // Hat band
  ctx.fillStyle = '#6d4028';
  ctx.fillRect(x - 16, y - 48, 32, 3);
  
  // Eyes with shine
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x - 6, y - 38, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 6, y - 38, 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 5, y - 39, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 7, y - 39, 1, 0, Math.PI * 2);
  ctx.fill();
  
  // Aiming indicator
  if (characters.mylo.mood === 'aiming') {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(windT * 5) * 0.3;
    const aimGrad = ctx.createRadialGradient(x + 24, y - 24, 0, x + 24, y - 24, 12);
    aimGrad.addColorStop(0, '#ffc933');
    aimGrad.addColorStop(1, 'rgba(255,201,51,0)');
    ctx.fillStyle = aimGrad;
    ctx.beginPath();
    ctx.arc(x + 24, y - 24, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  ctx.restore();
}

function drawDesertYard(myloX, myloY){
  ctx.save();
  
  const groundY = GAME_H * 0.78;
  const yardWidth = GAME_W * 0.6;
  const yardLeft = myloX - yardWidth / 2;
  const yardRight = myloX + yardWidth / 2;
  
  // Desert ground with texture
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, GAME_H);
  groundGrad.addColorStop(0, '#3d2817');
  groundGrad.addColorStop(0.3, '#2d1f13');
  groundGrad.addColorStop(1, '#1a120c');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, GAME_W, GAME_H - groundY);
  
  // Sand texture (subtle dots)
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#5a3d2a';
  for(let i = 0; i < 100; i++){
    const sx = rand(0, GAME_W);
    const sy = rand(groundY, GAME_H);
    ctx.beginPath();
    ctx.arc(sx, sy, rand(0.5, 1.5), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Wooden fence posts
  const postHeight = 35;
  const postWidth = 6;
  const numPosts = 9;
  const postSpacing = yardWidth / (numPosts - 1);
  
  for(let i = 0; i < numPosts; i++){
    const px = yardLeft + i * postSpacing;
    const py = groundY;
    
    // Post shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 3, py + 2, postWidth, postHeight);
    
    // Post
    ctx.globalAlpha = 1;
    const postGrad = ctx.createLinearGradient(px, py, px + postWidth, py);
    postGrad.addColorStop(0, '#4a3426');
    postGrad.addColorStop(0.5, '#5a3d2a');
    postGrad.addColorStop(1, '#3a2416');
    ctx.fillStyle = postGrad;
    ctx.fillRect(px, py, postWidth, postHeight);
    
    // Post top
    ctx.fillStyle = '#3a2416';
    ctx.beginPath();
    ctx.moveTo(px - 2, py);
    ctx.lineTo(px + postWidth / 2, py - 4);
    ctx.lineTo(px + postWidth + 2, py);
    ctx.fill();
    
    // Wood grain
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    for(let g = 0; g < 3; g++){
      ctx.beginPath();
      ctx.moveTo(px + 1, py + 10 + g * 8);
      ctx.lineTo(px + postWidth - 1, py + 12 + g * 8);
      ctx.stroke();
    }
  }
  
  // Horizontal fence rails
  const railY1 = groundY + 12;
  const railY2 = groundY + 24;
  
  ctx.fillStyle = '#5a3d2a';
  ctx.strokeStyle = '#3a2416';
  ctx.lineWidth = 1;
  
  // Top rail
  ctx.fillRect(yardLeft, railY1, yardWidth, 4);
  ctx.strokeRect(yardLeft, railY1, yardWidth, 4);
  
  // Bottom rail  
  ctx.fillRect(yardLeft, railY2, yardWidth, 4);
  ctx.strokeRect(yardLeft, railY2, yardWidth, 4);
  
  // Desert rocks scattered around
  const rocks = [
    {x: yardLeft + 40, y: groundY + 20, size: 18},
    {x: yardLeft + yardWidth - 60, y: groundY + 25, size: 22},
    {x: myloX - 80, y: groundY + 15, size: 14},
    {x: myloX + 70, y: groundY + 18, size: 16}
  ];
  
  for(const rock of rocks){
    // Rock shadow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(rock.x + 3, rock.y + rock.size * 0.4, rock.size * 0.8, rock.size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Rock body
    ctx.globalAlpha = 1;
    const rockGrad = ctx.createRadialGradient(
      rock.x - rock.size * 0.3,
      rock.y - rock.size * 0.3,
      0,
      rock.x,
      rock.y,
      rock.size
    );
    rockGrad.addColorStop(0, '#6b5344');
    rockGrad.addColorStop(0.6, '#4a3a2e');
    rockGrad.addColorStop(1, '#2d2218');
    ctx.fillStyle = rockGrad;
    
    // Irregular rock shape
    ctx.beginPath();
    for(let a = 0; a < Math.PI * 2; a += 0.8){
      const r = rock.size * (0.7 + Math.sin(a * 3) * 0.3);
      const x = rock.x + Math.cos(a) * r;
      const y = rock.y + Math.sin(a) * r * 0.7;
      if(a === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    
    // Rock highlights
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#8b7355';
    ctx.beginPath();
    ctx.arc(rock.x - rock.size * 0.25, rock.y - rock.size * 0.25, rock.size * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Small desert plants/brush
  ctx.globalAlpha = 0.6;
  const plants = [
    {x: yardLeft + 100, y: groundY + 15},
    {x: yardRight - 80, y: groundY + 12},
    {x: myloX - 60, y: groundY + 18},
    {x: myloX + 85, y: groundY + 14}
  ];
  
  for(const plant of plants){
    ctx.strokeStyle = '#4a5c2e';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    
    // Small tufts of grass
    for(let i = 0; i < 5; i++){
      const angle = rand(-0.5, 0.5);
      const len = rand(6, 12);
      ctx.beginPath();
      ctx.moveTo(plant.x + i * 3, plant.y);
      ctx.lineTo(
        plant.x + i * 3 + Math.sin(angle) * len,
        plant.y - len
      );
      ctx.stroke();
    }
  }
  
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawMeechie() {
  if (!characters.meechie.visible) return;
  const x = GAME_W * 0.5 + 50;
  const y = GAME_H * 0.92;
  const a = clamp(characters.meechie.timer / 1.5, 0, 1);
  const bounce = Math.sin(windT * 4) * 3 * a;
  
  ctx.save();
  ctx.globalAlpha = a;
  
  // Shadow
  ctx.globalAlpha = 0.25 * a;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x, y + 22, 18, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Enhanced robot helper
  ctx.globalAlpha = 0.85 * a;
  ctx.shadowBlur = 18;
  ctx.shadowColor = '#00ff88';
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 3.5;
  
  // Body
  ctx.beginPath();
  ctx.roundRect(x - 16, y - 22 + bounce, 32, 22, 4);
  ctx.stroke();
  const bodyGrad = ctx.createLinearGradient(x, y - 22, x, y);
  bodyGrad.addColorStop(0, 'rgba(0,255,136,0.15)');
  bodyGrad.addColorStop(1, 'rgba(0,255,136,0.05)');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  
  // Head
  ctx.beginPath();
  ctx.arc(x, y - 38 + bounce, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  
  // Antenna
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y - 52 + bounce);
  ctx.lineTo(x, y - 64 + bounce);
  ctx.stroke();
  
  // Antenna bulb
  ctx.shadowBlur = 24;
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(x, y - 66 + bounce, 6, 0, Math.PI * 2);
  ctx.fill();
  
  // Digital eyes
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(x - 9, y - 41 + bounce, 5, 5);
  ctx.fillRect(x + 4, y - 41 + bounce, 5, 5);
  
  // Smile
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y - 33 + bounce, 6, 0, Math.PI);
  ctx.stroke();
  
  // Panel lights
  for(let i = 0; i < 3; i++){
    const phase = Math.sin(windT * 3 + i) * 0.5 + 0.5;
    ctx.globalAlpha = a * 0.6 * phase;
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.arc(x - 8 + i * 8, y - 15 + bounce, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

/* ===================== */
/* BALL FACTORY */
/* ===================== */
const GRAVITY = -0.10;
const AIR_DRAG = 0.9996;
function spinMultiplier(){
  if(spinMode==="low") return 0.55;
  if(spinMode==="med") return 0.85;
  return 1.15;
}
function makeBall(x,y,vx,vy,isPractice){
  const baseR=14;
  return {
    x,y,vx,vy, r:baseR, rot:0, rotV:0, life:0, maxLife:6.5, hitAny:false, isPractice:!!isPractice, trail:[]
  };
}

/* ===================== */
/* INPUT / AIM */
/* ===================== */
let aiming=false;
let aimStart=null;
let aimNow=null;
function getPosScaled(e){
  const rect = c.getBoundingClientRect();
  return { x: (e.clientX - rect.left), y: (e.clientY - rect.top) };
}
function onPointerDown(e){
  e.preventDefault();
  ensureAudio();
  aiming = true;
  c.setPointerCapture(e.pointerId);
  aimStart = getPosScaled(e);
  aimNow = { ...aimStart };
}
function onPointerMove(e){
  if(!aiming) return;
  aimNow = getPosScaled(e);
}
function onPointerUp(e){
  if(!aiming) return;
  aiming = false;
  aimNow = getPosScaled(e);
  try{ c.releasePointerCapture(e.pointerId); }catch(_){}
  fireShot(false);
  aimStart = null;
  aimNow = null;
}
c.addEventListener("pointerdown", onPointerDown, { passive:false });
c.addEventListener("pointermove", onPointerMove, { passive:false });
c.addEventListener("pointerup", onPointerUp, { passive:false });
c.addEventListener("pointercancel", onPointerUp, { passive:false });

/* ===================== */
/* FIRING */
/* ===================== */
function fireShot(isPractice){
  if(!isPractice && shots<=0) return;
  if(!aimStart || !aimNow) return;
  hitsThisShot = 0;
  shotInProgress = true;
  shotHadHit = false;
  const dx = aimStart.x - aimNow.x;
  const dy = aimStart.y - aimNow.y;
  const mag = Math.hypot(dx, dy);
  if (mag < 10) return;
  if (!isPractice) shots--;
  const startX = GAME_W * 0.5;
  const startY = GAME_H * 0.88;
  const nx = dx / mag;
  const ny = dy / mag;
  const power = clamp(mag * 0.040 + 3.5, 5.8, 15.0);
  let vx = nx * power;
  let vy = ny * power;
  const windShot = (level < 5) ? (wind * 0.28) : (wind * 0.55);
  vx += windShot;
  vy += windShot * 0.10;
  const b = makeBall(startX, startY, vx, vy, isPractice);
  b.rotV += clamp(dx * 0.01, -2.5, 2.5) * spinMultiplier();
  balls.push(b);
  
  // Launch particles
  createParticles(startX, startY, '#ffc933', 8);
  beep(240, 0.06);
}

/* ===================== */
/* PRACTICE SHOT */
/* ===================== */
function doPractice(){
  if(practiceUsed) return;
  if(balls.length>0) return;
  practiceUsed=true;
  practiceBtn.textContent="PRACTICE (0)";
  practiceBtn.classList.add("locked");
  practiceBtn.disabled=true;
  if(!aimStart){ aimStart={x:GAME_W*0.5,y:GAME_H*0.88}; aimNow={x:GAME_W*0.5,y:GAME_H*0.98}; }
  fireShot(true);
}

/* ===================== */
/* SAVE / LOAD */
/* ===================== */
function saveProgress(){
  if(!walletPubkey) return;
  const data={ level, shots, rftPoints, bgMode, spinMode };
  localStorage.setItem(saveKey, JSON.stringify(data));
}
function loadProgress(){
  if(!walletPubkey) return;
  const raw=localStorage.getItem(saveKey);
  if(!raw) return;
  try{
    const d=JSON.parse(raw);
    if(typeof d.level==="number") level=d.level;
    if(typeof d.shots==="number") shots=d.shots;
    if(typeof d.rftPoints==="number") rftPoints=d.rftPoints;
    if(d.bgMode) bgMode=d.bgMode;
    if(d.spinMode) spinMode=d.spinMode;
  }catch(_){}
}

/* ===================== */
/* PHANTOM CONNECT */
/* ===================== */
function setWalletUI(pkStr){
  walletPubkey = pkStr;
  saveKey = `tumbleverse:${walletPubkey}`;
  walletBtn.textContent = walletPubkey.slice(0,4) + "..." + walletPubkey.slice(-4);
  saveLine.innerHTML = `<span class="ok">SAVING ENABLED</span> — WALLET CONNECTED`;
  loadProgress();
  applyModeLabels();
  updateClaimState();
  log("WALLET CONNECTED ✓", "ok");
  saveProgress();
}
function clearWalletUI(){
  walletPubkey = null;
  saveKey = null;
  walletBtn.textContent = "CONNECT WALLET";
  saveLine.textContent = "Connect wallet to save progress";
  updateClaimState();
  log("WALLET DISCONNECTED", "no");
}
async function connectWallet(){
  try{
    const provider = window.solana;
    if(!provider || !provider.isPhantom){
      alert("Phantom not found. Install Phantom to save progress.");
      window.open("https://phantom.app/", "_blank");
      return;
    }
    if(provider.isConnected && provider.publicKey){
      setWalletUI(provider.publicKey.toString());
      return;
    }
    const resp = await provider.connect();
    if(resp && resp.publicKey){
      setWalletUI(resp.publicKey.toString());
      return;
    }
    log("WALLET CONNECT FAILED", "no");
  }catch(e){
    log("WALLET CONNECT FAILED", "no");
  }
}
if(window.solana){
  window.solana.on?.("disconnect", clearWalletUI);
}

/* ===================== */
/* ADVANCE LEVEL */
/* ===================== */
function advanceLevel(){
  const leftover = shots;
  level += 1;
  shots = clamp(baseShots + leftover, baseShots, 8);
  bonusShotsThisLevel=0;
  log(`LEVEL ${level} • SHOTS: ${shots}`,"ok");
  spawnPins();
  saveProgress();
}

/* ===================== */
/* UPDATE LOOP */
/* ===================== */
function update(dt){
  windT += dt;
  const wStr = windStrength(level);
  wind = Math.sin(windT * 0.7) * wStr;
  windEl.textContent = wind.toFixed(2);
 
  characters.breezy.strength = Math.abs(wind);
  characters.breezy.dir = Math.sign(wind);

  if (aiming) {
    characters.mylo.mood = "aiming";
  } else if (shotHadHit) {
    characters.mylo.mood = "happy";
    characters.mylo.glow = Math.min(characters.mylo.glow + dt * 2, 1);
  } else {
    characters.mylo.mood = "idle";
    characters.mylo.glow = Math.max(characters.mylo.glow - dt * 1.5, 0);
  }

  if (levelCleared) {
    levelClearTimer -= dt;
    if (levelClearTimer <= 0) {
      characters.meechie.visible = true;
      characters.meechie.timer = 1.5;
      levelCleared = false;
      levelClearTimer = 0;
      advanceLevel();
    }
    return;
  }

  // Update particles
  updateParticles(dt);

  const pad = 18 + 12;
  const left = pad;
  const right = GAME_W - pad;
  const top = GAME_H * 0.12;
  const bottom = GAME_H * 0.55;
  for (const p of pins) {
    if (!p.alive) continue;
    p.floatAngle += rand(-p.floatTurn, p.floatTurn) * dt;
    const ax = Math.cos(p.floatAngle) * (p.floatSpeed * 38);
    const ay = Math.sin(p.floatAngle) * (p.floatSpeed * 24);
    const buoy = -12 * p.mass;
    p.vx += ax * dt;
    p.vy += (ay + buoy) * dt;
    const damp = Math.pow(0.985, dt * 60);
    p.vx *= damp;
    p.vy *= damp;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < left) { p.x = left; p.vx = Math.abs(p.vx) + 55; p.floatAngle = rand(-0.9, 0.9); }
    else if (p.x > right) { p.x = right; p.vx = -Math.abs(p.vx) - 55; p.floatAngle = Math.PI + rand(-0.9, 0.9); }
    if (p.y < top) { p.y = top; p.vy = Math.abs(p.vy) + 18; }
    else if (p.y > bottom) { p.y = bottom; p.vy = -Math.abs(p.vy) - 18; }
    const speed = Math.hypot(p.vx, p.vy);
    if (speed < 22) {
      const a = rand(0, Math.PI * 2);
      p.vx = Math.cos(a) * 22;
      p.vy = Math.sin(a) * 16;
    }
  }

  for(const b of balls){
    b.life += dt;
    b.vx += wind * 0.18;
    b.vx += Math.sin(b.rot) * 0.045 * spinMultiplier();
    b.vy += GRAVITY;
    b.vx *= AIR_DRAG;
    b.x += b.vx;
    b.y += b.vy;
    b.rot += (Math.hypot(b.vx,b.vy)*0.06 + b.rotV*0.03);
    b.trail.push({x:b.x,y:b.y,life:0.4});
    for(const t of b.trail) t.life -= dt;
    b.trail = b.trail.filter(t=>t.life>0);
    const wallPadding = b.r + 6;
    if(b.x < wallPadding){ 
      b.x = wallPadding; 
      b.vx *= -0.75; 
      b.rotV *= 0.7; 
      createParticles(b.x, b.y, '#00f0ff', 6);
      beep(180,0.04); 
    }
    if(b.x > GAME_W - wallPadding){ 
      b.x = GAME_W - wallPadding; 
      b.vx *= -0.75; 
      b.rotV *= 0.7; 
      createParticles(b.x, b.y, '#00f0ff', 6);
      beep(180,0.04); 
    }

    if(!b.isPractice){
      for(const p of pins){
        if(!p.alive) continue;
        const d = Math.hypot(b.x - p.x, b.y - p.y);
        if(d < b.r + p.r){
          b.hitAny = true;
          shotHadHit = true;
          p.alive = false;
          hitsThisShot++;
          streak++;
          rftPoints += 5;
          streakEl.textContent = streak;
          mobileStreakEl.textContent = streak;
          
          // Hit particles
          createParticles(p.x, p.y, '#00ff88', 16);
          beep(520, 0.08);
          vibrate(40);
          
          if(streak >= 3 && bonusShotsThisLevel < BONUS_CAP){
            shots += 1;
            bonusShotsThisLevel++;
            streak = 0;
            streakEl.textContent = streak;
            mobileStreakEl.textContent = streak;
            beep(760, 0.12);
            vibrate(120);
            log("🔥 COMBO! +1 SHOT", "ok");
          }else{
            log(`HIT ${hitsThisShot} • COMBO ${streak}`);
          }
          const nx = (p.x - b.x) / (d || 1);
          const ny = (p.y - b.y) / (d || 1);
          p.vx += nx * 220;
          p.vy += ny * 140;
          break;
        }
      }
    }

    if(b.y + b.r < -40) b.dead=true;
    if(b.y - b.r > GAME_H + 60) b.dead=true;
    if(b.life > b.maxLife) b.dead=true;
  }
  if(balls.length){
    balls = balls.filter(b=>!b.dead);
  }

  if(shotInProgress && balls.length===0){
    shotInProgress = false;
    if(hitsThisShot === 0){
      streak = 0;
      streakEl.textContent = streak;
      mobileStreakEl.textContent = streak;
      log("MISS • COMBO RESET", "no");
    }
    const alive = pins.filter(p=>p.alive).length;
    if (alive === 0 && !levelCleared) {
      levelCleared = true;
      levelClearTimer = 0.5;
      nextBtn.classList.remove("locked");
      nextBtn.disabled = false;
      rftPoints += 25;
      updateClaimState();
      
      // Level clear particles
      createParticles(GAME_W * 0.5, GAME_H * 0.5, '#ffc933', 24);
      log("LEVEL CLEARED ✓","ok");
      beep(980,0.08);
      vibrate(80);
    }
    if(alive > 0 && shots <= 0){
      level = 1;
      shots = baseShots;
      levelCleared = false;
      levelClearTimer = 0;
      if(!walletPubkey){
        streak = 0;
        bonusShotsThisLevel = 0;
        rftPoints = 0;
        streakEl.textContent = streak;
        mobileStreakEl.textContent = streak;
      }
      log("GAME OVER • RESET TO LVL 1","no");
      vibrate(180);
      spawnPins();
    }
  }

  if (characters.meechie.visible) {
    characters.meechie.timer -= dt;
    if (characters.meechie.timer <= 0) characters.meechie.visible = false;
  }
  
  // Update planets rotation
  for(const planet of planets){
    planet.rotation += planet.rotSpeed * dt;
  }

  const alivePins = pins.filter(p=>p.alive).length;
  pinsEl.textContent = alivePins;
  mobilePinsEl.textContent = alivePins;
  shotsEl.textContent = shots;
  mobileShotsEl.textContent = shots;
  lvlEl.textContent = level;
  mobileLvlEl.textContent = level;
  ptsEl.textContent = rftPoints;
  walletPtsEl.textContent = rftPoints;
  saveProgress();
}

/* ===================== */
/* RENDER */
/* ===================== */
function draw(){
  drawBackground();
  drawBreezy();
  
  // Draw pins
  for(const p of pins){
    if(p.alive) drawVectorPin(p);
  }
  
  // Draw aim line
  if(aiming && aimStart && aimNow){
    const dx=aimStart.x-aimNow.x, dy=aimStart.y-aimNow.y;
    const mag=Math.hypot(dx,dy);
    if(mag>10){
      ctx.save();
      ctx.globalAlpha=0.6;
      ctx.shadowBlur=20;
      ctx.shadowColor='#ff2e97';
      ctx.strokeStyle='#ff2e97';
      ctx.lineWidth=4;
      ctx.lineCap='round';
      
      // Dashed line
      ctx.setLineDash([10, 8]);
      ctx.beginPath();
      ctx.moveTo(GAME_W*0.5, GAME_H*0.88);
      ctx.lineTo(GAME_W*0.5 + dx*0.4, GAME_H*0.88 + dy*0.4);
      ctx.stroke();
      
      // Power indicator at end
      const power = clamp(mag / 300, 0, 1);
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.8;
      const endX = GAME_W*0.5 + dx*0.4;
      const endY = GAME_H*0.88 + dy*0.4;
      const powerGrad = ctx.createRadialGradient(endX, endY, 0, endX, endY, 15);
      powerGrad.addColorStop(0, '#ff2e97');
      powerGrad.addColorStop(1, 'rgba(255,46,151,0)');
      ctx.fillStyle = powerGrad;
      ctx.beginPath();
      ctx.arc(endX, endY, 15 * power, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
  }
  
  // Draw particles
  drawParticles();
  
  // Draw balls
  for(const b of balls){
    drawVectorBall(b, b.isPractice?0.5:1);
  }
  
  // Preview ball when idle
  if(balls.length===0 && !aiming){
    const preview = { x:GAME_W*0.5, y:GAME_H*0.88, r:14, rot:windT*1.2, trail:[] };
    drawVectorBall(preview,0.6);
  }
  
  drawMylo();
  drawMeechie();
}

/* ===================== */
/* MAIN LOOP */
/* ===================== */
let last=performance.now();
function loop(t){
  const dt=(t-last)/1000; last=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ===================== */
/* UI ACTIONS */
/* ===================== */
function applyModeLabels(){
  bgBtn.textContent = "BG: " + (bgMode==="day"?"DAY":bgMode==="dusk"?"DUSK":"NIGHT");
  spinBtn.textContent = "SPIN: " + (spinMode==="low"?"LOW":spinMode==="med"?"MED":"HIGH");
}

walletBtn.addEventListener("click", connectWallet);
resetBtn.addEventListener("click", ()=>{
  level=1;
  shots=baseShots;
  streak=0;
  bonusShotsThisLevel=0;
  rftPoints=0;
  streakEl.textContent = streak;
  mobileStreakEl.textContent = streak;
  log("RUN RESET","ok");
  spawnPins();
  saveProgress();
});

claimBtn.onclick = async () => {
  if (!walletPubkey) { log("CONNECT WALLET TO CLAIM", "no"); return; }
  if (rftPoints <= 0) { log("NO RFT TO CLAIM", "no"); return; }
  try {
    const message = buildClaimMessage(walletPubkey, rftPoints);
    const encoded = new TextEncoder().encode(message);
    const signed = await window.solana.signMessage(encoded);
    const claimProof = {
      wallet: walletPubkey,
      points: rftPoints,
      signature: Array.from(signed.signature),
      message,
      timestamp: Date.now()
    };
    const res = await fetch("http://127.0.0.1:8787/claim", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(claimProof)
    });
    const data = await res.json();
    if(!data || (!data.ok && !data.success)){
      throw new Error((data && data.error) ? data.error : "Backend rejected claim");
    }
    const claimed = rftPoints;
    rftPoints = 0;
    updateClaimState();
    log(`CLAIMED ${claimed} RFT ✓`, "ok");
    beep(720, 0.12);
    vibrate(120);
  }catch(err){
    log("CLAIM CANCELLED OR FAILED","no");
  }
};

practiceBtn.addEventListener("click", doPractice);
bgBtn.addEventListener("click", ()=>{
  bgMode = (bgMode==="day") ? "dusk" : (bgMode==="dusk") ? "night" : "day";
  applyModeLabels();
  saveProgress();
});
spinBtn.addEventListener("click", ()=>{
  spinMode = (spinMode==="low") ? "med" : (spinMode==="med") ? "high" : "low";
  applyModeLabels();
  saveProgress();
});
nextBtn.addEventListener("click", ()=>{
  if(levelCleared) return;
  advanceLevel();
});

/* ===================== */
/* TABS SWITCHING */
/* ===================== */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ===================== */
/* MOBILE MENU TOGGLE */
/* ===================== */
const menuBtn = document.getElementById('mobileMenuBtn');
const side = document.getElementById('side');
if (menuBtn && side) {
  menuBtn.addEventListener('click', () => {
    side.classList.toggle('open');
  });
}

/* ===================== */
/* BOOT */
/* ===================== */
function boot(){
  initBackgroundElements();
  applyModeLabels();
  spawnPins();
  streakEl.textContent = streak;
  mobileStreakEl.textContent = streak;
  log("SYSTEM ONLINE ✓","ok");
  log("PULL & RELEASE TO FIRE");
  requestAnimationFrame(loop);
}
boot();

window.addEventListener("load", async ()=>{
  const provider = window.solana;
  if(provider && provider.isPhantom){
    try{
      const resp = await provider.connect({ onlyIfTrusted:true });
      if(resp && resp.publicKey){
        setWalletUI(resp.publicKey.toString());
        log("AUTO-CONNECTED ✓","ok");
      }
    }catch(_){}
  }
});
</script>
</body>
</html>
